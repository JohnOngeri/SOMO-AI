# Local dev infrastructure. From repo root: docker compose -f infra/docker-compose.yml up -d
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: somo
      POSTGRES_PASSWORD: somo
      POSTGRES_DB: somo
    ports:
      - '5432:5432'
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U somo']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - ./volumes/redis:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: somo
      MINIO_ROOT_PASSWORD: somo-dev-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - ./volumes/minio:/data
