name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      # Used by backend integration tests from Phase 2 onward.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: somo
          POSTGRES_PASSWORD: somo
          POSTGRES_DB: somo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U somo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://somo:somo@localhost:5432/somo_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
